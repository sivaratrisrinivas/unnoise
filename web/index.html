<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>unnoise</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/app.js" defer></script>
  </head>
  <body data-view="setup">
    <main class="app-shell">
      <section id="setupScreen" class="screen screen-setup" aria-labelledby="heroTitle">
        <p class="brand">unnoise</p>
        <h1 id="heroTitle">Prompt becomes image.</h1>
        <p class="lede">A tiny CPU text-to-image walk from words to a picture.</p>

        <div class="control-card">
          <div class="field">
            <label for="promptInput">Prompt</label>
            <input
              id="promptInput"
              class="text-input"
              type="text"
              value="a red bicycle on a rainy street"
              placeholder="Describe the image you want"
              autocomplete="off"
              spellcheck="false"
            />
          </div>

          <div class="field">
            <div class="slider-head">
              <label for="stepSlider">Denoising steps</label>
              <output id="stepValue" class="step-value" for="stepSlider">10</output>
            </div>

            <input
              id="stepSlider"
              class="step-slider"
              type="range"
              min="5"
              max="20"
              step="5"
              value="10"
            />

            <div class="step-scale" aria-hidden="true">
              <span>5 faster</span>
              <span>20 cleaner</span>
            </div>
          </div>

          <button id="generateBtn" class="generate-btn" type="button">
            Generate
          </button>
        </div>

        <p id="setupMessage" class="fineprint">Describe the image you want.</p>
      </section>

      <section id="loadingScreen" class="screen screen-loading" hidden aria-live="polite">
        <div class="loader" aria-hidden="true"></div>
        <p class="brand">unnoise</p>
        <h2>Walking from words to image.</h2>
        <p id="statusText" class="status">Loading the model.</p>
      </section>

      <section id="revealScreen" class="screen screen-reveal" hidden aria-live="polite">
        <div class="frame-stage" aria-label="Diffusion frame" aria-live="polite">
          <div id="previewPlaceholder" class="placeholder">
            <span class="placeholder-kicker">Reveal</span>
            <strong>The final image will emerge here.</strong>
          </div>
          <img id="previewImage" alt="Diffusion frame" hidden />
        </div>

        <p class="frame-meta">
          <span id="frameLabel">noise</span>
          <span aria-hidden="true">·</span>
          <span id="frameCounter">1 / 1</span>
        </p>

        <button id="resetBtn" class="home-btn" type="button" hidden>
          Back to setup
        </button>
      </section>
    </main>
  </body>
</html>
