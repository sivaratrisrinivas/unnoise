<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noise → Meaning</title>
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/app.js" defer></script>
  </head>
  <body data-view="setup">
    <main class="app-shell">
      <section id="setupScreen" class="screen screen-setup" aria-labelledby="heroTitle">
        <p class="kicker">CPU-only diffusion lab</p>
        <h1 id="heroTitle">Noise <span aria-hidden="true">→</span> Meaning</h1>
        <p class="lede">
          Choose how many denoising steps you want, then generate one walk from pure noise.
        </p>

        <div class="control-card">
          <div class="slider-head">
            <label for="stepSlider">Denoising steps</label>
            <output id="stepValue" class="step-value" for="stepSlider">50</output>
          </div>

          <input
            id="stepSlider"
            class="step-slider"
            type="range"
            min="10"
            max="100"
            step="10"
            value="50"
          />

          <div class="step-scale" aria-hidden="true">
            <span>10</span>
            <span>100</span>
          </div>

          <button id="generateBtn" class="generate-btn" type="button">
            Generate walk
          </button>
        </div>

        <p id="stepNote" class="step-note">The model runs on CPU and starts from noise.</p>
      </section>

      <section id="loadingScreen" class="screen screen-loading" hidden aria-live="polite">
        <div class="loader" aria-hidden="true"></div>
        <h2>Walking from noise to meaning.</h2>
        <p id="statusText" class="status">Loading the model.</p>
      </section>

      <section id="revealScreen" class="screen screen-reveal" hidden>
        <button
          id="frameStage"
          class="frame-stage"
          type="button"
          aria-label="Advance to the next frame"
        >
          <span class="frame-sheen" aria-hidden="true"></span>
          <div id="previewPlaceholder" class="placeholder">
            <span class="placeholder-kicker">Reveal</span>
            <strong>Click the frame to step forward.</strong>
          </div>
          <img id="previewImage" alt="Diffusion frame" hidden />
        </button>

        <p class="frame-meta">
          <span id="frameLabel">noise</span>
          <span aria-hidden="true">·</span>
          <span id="frameCounter">1 / 1</span>
        </p>
      </section>
    </main>
  </body>
</html>
